<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERV - Registro de Piloto</title>
    <link rel="stylesheet" href="../css/style.css"> 
    <link rel="stylesheet" href="../css/pages/registro.css">
</head>
<body class="registro-page">

    <header class="header">
    <a href="../pages/index.html" class="logo">
      <img src="../assets/img/logoEvangelion.webp" alt="Home">
    </a>

    <div class="search-box">
        <div class="input-wrapper">
            <input type="text" placeholder="Pesquisar Personagens..">
            <img src="../assets/img/lupa.png" alt="Buscar">
        </div>
    </div>

  <nav>
    <a href="../pages/login.html">Login</a>
    <a href="../pages/registro.html">Registro</a>

  </nav>
    </header>

    <div class="registro-wrapper">
        <main class="registro-container">
            <form action="#" class="registro-form">
                
                <h1 class="fonteEvangelion">NOVO RECRUTA</h1>
                <p>Preencha os dados para iniciar a sincronização com o EVA.</p>

                <div class="campo">
                    <label for="nome">Nome do Piloto:</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Shinji Ikari" required>
                </div>

                <div class="campo">
                    <label for="email">E-mail Institucional:</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@nerv.jp" required>
                </div>

                <div class="campo">
                    <label for="senha">Definir Código (Senha):</label>
                    <input type="password" id="senha" name="senha" placeholder="********" required>
                </div>

                <div class="campo">
                    <label for="confirmar">Confirmar Código:</label>
                    <input type="password" id="confirmar" name="confirmar" placeholder="********" required>
                </div>

                <button type="submit" class="btn-registro">SOLICITAR ACESSO</button>

                <div class="registro-footer">
                    <p>Já possui ID de Piloto? <a href="login.html">Efetuar Login</a></p>
                </div>
            </form>
        </main>
    </div>

</body>
</html>
