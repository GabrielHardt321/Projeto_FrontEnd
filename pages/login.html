<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERV - Login</title>
    <link rel="stylesheet" href="../css/style.css"> 
    <link rel="stylesheet" href="../css/pages/login.css">
</head>
<body class="login-page">

    <header class="header">
        <a href="../pages/index.html" class="logo">
            <img src="../assets/img/logoEvangelion.webp" alt="Home">
        </a>
        <nav>
            <a href="login.html">Login</a>
            <a href="registro.html">Registro</a>
        </nav>
    </header>

    <div class="login-wrapper">
        <main class="login-container">
            <form action="#" class="login-form">
                
                <h1 class="fonteEvangelion">ACESSO NERV</h1>
                <p>Insira suas credenciais de piloto.</p>

                <div class="campo">
                    <label for="email">E-mail de Piloto:</label>
                    <input type="email" id="email" name="email" placeholder="ex: shinji@nerv.jp" required>
                </div>

                <div class="campo">
                    <label for="senha">Código de Segurança (Senha):</label>
                    <input type="password" id="senha" name="senha" placeholder="********" required>
                </div>

                <button type="submit" class="btn-login">Iniciar Sincronização</button>

                <div class="login-footer">
                    <p>Não tem acesso? <a href="registro.html">Solicitar Registro</a></p>
                    <a href="#" class="forgot-password">Esqueceu o código?</a>
                </div>
            </form>
        </main>
    </div>

</body>
</html>
